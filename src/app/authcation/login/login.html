<section class="login-container">
  <div class="side-panel">

    <div class="logo-wrapper">

      <img src="/assets/Img/logo.svg" alt="Law Firm Logo" width="200" height="auto">

    </div>
  </div>

  <div class="login-form-wrapper">
    <div class="login-card">
      <div class="brand-header">
        <img
          src="/assets/Img/logo.svg"
          alt="Law Firm Logo"
          class="app-logo"
          width="200"
          height="auto"
        />
        <h1>مرحباً بعودتك</h1>
        <p class="subtitle">الرجاء تسجيل الدخول إلى حسابك</p>
      </div>

      <form [formGroup]="Form()" (ngSubmit)="onSubmit()" class="modern-form">
        <div class="form-group">
          <label for="email">البريد الإلكتروني</label>
          <div class="input-container" [class.error]="getControlName('email')?.invalid && getControlName('email')?.touched">
            <span class="icon"><i class="fa-solid fa-envelope"></i></span>
            <input
              id="email"
              type="email"
              formControlName="email"
              placeholder="Enter your email"
            />
          </div>
          <div class="error-msg" *ngIf="getControlName('email')?.invalid && getControlName('email')?.touched">
            <small *ngIf="getControlName('email')?.errors?.['required']">البريد الإلكتروني مطلوب</small>
            <small *ngIf="getControlName('email')?.errors?.['email']">الرجاء إدخال بريد إلكتروني صحيح</small>
          </div>
        </div>

        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <div class="input-container" [class.error]="getControlName('password')?.invalid && getControlName('password')?.touched">
            <span class="icon"><i class="fa-solid fa-lock"></i></span>
            <input
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              formControlName="password"
              placeholder="Enter your password"
            />
            <span class="toggle-password" (click)="togglePasswordVisibility()" role="button" tabindex="0">
              <i class="fa-solid" [class.fa-eye]="!showPassword()" [class.fa-eye-slash]="showPassword()"></i>
            </span>
          </div>
          <div class="error-msg" *ngIf="getControlName('password')?.invalid && getControlName('password')?.touched">
            <small>كلمة المرور مطلوبة</small>
          </div>
        </div>

        <div class="form-actions">
          <a routerLink="/auth/forgot-password" class="forgot-password">هل نسيت الباسورد؟</a>
        </div>

        <button type="submit" class="btn-primary" [disabled]="Form().invalid">
          <span>تسجيل الدخول</span>
          <i class="fa-solid fa-arrow-right"></i>
        </button>


      </form>
    </div>
  </div>
</section>
