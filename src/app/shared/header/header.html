<section class="section-header">
  <div class="content-header container">
    <div>
      <img height="70" width="70" src="/assets/Img/LOGO-GOLD.svg" alt="Logo" class="logo-header" />
    </div>

    <div class="header-links">
      <div>
        <ul>
          <li [routerLink]="['/']" (click)="onClickListActive('Home')">
            <a>{{ 'NAV_HOME' | translate }}</a>
          </li>
          <li (click)="onClickListActive('About')">
            <a>{{ 'NAV_ABOUT' | translate }}</a>
          </li>
          <li (click)="onClickListActive('HowWork')">
            <a>{{ 'NAV_HOW_IT_WORKS' | translate }}</a>
          </li>
          <li (click)="onClickListActive('Services')">
            <a>{{ 'NAV_SERVICES' | translate }}</a>
          </li>

           <li [routerLink]="['/booking']">
            <a>{{"Book_with_us"|translate}}</a>
          </li>
        </ul>
      </div>
    </div>


    <div class="btn-header-div">
      <button [routerLink]="['/auth/login']" class="btn-header">
        {{ 'LOGIN' | translate }}
      </button>

      <app-translation></app-translation>
    </div>
  </div>
</section>
