<p-table
  [value]="tableData"
  [paginator]="true"
  [rows]="11"
  stripedRows
  [tableStyle]="{ 'min-width': '50rem' }"
>
  <!-- HEADER -->
  <ng-template pTemplate="header">
    <tr>
      <ng-container *ngFor="let col of bodytabel">
        <th>
          {{ col.key | translate }}
        </th>
      </ng-container>

      <!-- Procedures column -->
      <th *ngIf="actionsTpl" style="text-align: center">{{"Procedures"|translate}}</th>
    </tr>
  </ng-template>

  <!-- BODY -->

<ng-template pTemplate="body" let-row>
    <tr>
      <ng-container *ngFor="let col of bodytabel">
        <td>
          {{ formatCell(col.value, row[col.value]) }}
        </td>
      </ng-container>

      <td *ngIf="actionsTpl">
        <ng-container
          *ngTemplateOutlet="actionsTpl; context: { $implicit: row }"
        ></ng-container>
      </td>
    </tr>
    </ng-template>
</p-table>

<ng-content></ng-content>
