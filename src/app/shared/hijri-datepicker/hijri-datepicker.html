<div class="hijri-datepicker" [class.disabled]="disabled()">
  <!-- Input -->
  <div class="hijri-input-wrapper" (click)="toggle()">
    <button type="button" class="hijri-icon-btn" tabindex="-1">
      <i class="fa-regular fa-calendar"></i>
    </button>
    <input type="text"
           readonly
           class="hijri-input"
           [value]="displayValue()"
           [placeholder]="placeholder"
           [disabled]="disabled()" />
    <button *ngIf="showClear && displayValue()"
            type="button" class="hijri-clear-btn"
            (click)="clear($event)">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>

  <!-- Calendar dropdown -->
  <div class="hijri-panel" *ngIf="open()">
    <!-- Header -->
    <div class="hijri-header">
      <button type="button" class="hijri-nav-btn" (click)="nextMonth()">
        <i class="fa-solid fa-chevron-right"></i>
      </button>
      <span class="hijri-title">{{ headerMonth() }} {{ headerYear() }}</span>
      <button type="button" class="hijri-nav-btn" (click)="prevMonth()">
        <i class="fa-solid fa-chevron-left"></i>
      </button>
    </div>

    <!-- Weekday labels -->
    <div class="hijri-weekdays">
      <span *ngFor="let d of weekDays">{{ d }}</span>
    </div>

    <!-- Day grid -->
    <div class="hijri-grid">
      <button *ngFor="let cell of cells()"
              type="button"
              class="hijri-day"
              [class.in-month]="cell.inMonth"
              [class.out-month]="!cell.inMonth"
              [class.selected]="isSelected(cell)"
              [class.today]="isToday(cell)"
              (click)="selectDay(cell)">
        {{ cell.hijriDay }}
      </button>
    </div>
  </div>
</div>
