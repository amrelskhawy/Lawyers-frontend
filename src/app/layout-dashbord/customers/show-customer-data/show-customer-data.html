<p-dialog
  maskStyleClass="backdrop-blur-sm"
  [(visible)]="visible"
  (onHide)="onClose()"
  [modal]="true"
  [baseZIndex]="10000"
  [style]="{ width: '30rem', overflow: 'hidden' }"
>
  <ng-template #headless>
    <div class="wrapper-data">
      <img height="70" width="70" src="/assets/Img/LOGO-GOLD.svg" alt="Logo" class="logo-header" />
      <div class="content-obj-data">
        <h2>{{ objItem()?.fullName }}</h2>
        <div class="info-row">
          <i class="fa-regular fa-envelope"></i>
          <span>{{ objItem()?.email }}</span>
        </div>
        <div class="info-row">
          <i class="fa-solid fa-phone"></i>
          <span>{{ objItem()?.phone }}</span>
        </div>
        <div class="info-row" *ngIf="objItem()?.location">
          <i class="fa-solid fa-location-dot"></i>
          <span>{{ objItem()?.location }}</span>
        </div>

        <button class="btn-close-dilog" (click)="closeDialog()">
          <i class="fa-solid fa-xmark"></i> {{ 'close' | translate }}
        </button>
      </div>
    </div>
  </ng-template>
</p-dialog>
