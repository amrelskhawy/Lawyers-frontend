<div class="edit-case-page" dir="rtl">

  <!-- ============ ACTION BAR ============ -->
  <div class="action-bar">
    <div class="left">
      <button class="back-btn" (click)="back()" [attr.aria-label]="'back' | translate">
        <i class="fa-solid fa-arrow-right"></i>
      </button>
      <h2>{{ 'edit_case' | translate }}</h2>

      <span class="save-pill" [class.unsaved]="saveStatus() === 'unsaved'" [class.saving]="saveStatus() === 'saving'"
        [class.saved]="saveStatus() === 'saved'" [class.error]="saveStatus() === 'error'">
        <ng-container [ngSwitch]="saveStatus()">
          <ng-container *ngSwitchCase="'unsaved'">
            <i class="fa-solid fa-circle-dot"></i> {{ 'unsaved_changes' | translate }}
          </ng-container>
          <ng-container *ngSwitchCase="'saving'">
            <i class="fa-solid fa-cloud-arrow-up"></i> {{ 'saving' | translate }}
          </ng-container>
          <ng-container *ngSwitchCase="'saved'">
            <i class="fa-solid fa-check"></i> {{ 'saved' | translate }}
          </ng-container>
          <ng-container *ngSwitchCase="'error'">
            <i class="fa-solid fa-triangle-exclamation"></i> {{ 'save_error' | translate }}
          </ng-container>
        </ng-container>
      </span>
    </div>

    <div class="right">
      <button class="btn-save" (click)="save()"
        [disabled]="saveStatus() === 'saving' || saveStatus() === 'idle' || saveStatus() === 'saved'">
        <i class="fa-solid fa-floppy-disk"></i>
        {{ 'save' | translate }}
      </button>
      <button class="btn-secondary" (click)="generatePdf()"
        [disabled]="generating() || saveStatus() === 'unsaved' || saveStatus() === 'saving'"
        [pTooltip]="saveStatus() === 'unsaved' ? ('save_first' | translate) : ''" tooltipPosition="bottom">
        <i class="fa-solid fa-file-pdf"></i>
        {{ (generating() ? 'generating' : 'generate_pdf') | translate }}
      </button>
    </div>
  </div>

  <!-- ============ 2-COLUMN GRID ============ -->
  <div class="grid" *ngIf="!loading(); else loadingTpl">

    <!-- LEFT: form -->
    <section class="card form-card">
      <form [formGroup]="Form" class="form-body">

        <h3 class="section-title">{{ 'client_intake' | translate }}</h3>

        <div class="row">
          <div class="input-group">
            <label>{{ 'case_customer' | translate }}</label>
            <p-select formControlName="customerId" [options]="customers()" optionLabel="fullName" optionValue="id"
              [filter]="true" filterBy="fullName,phone,email" [placeholder]="'select_customer' | translate"
              styleClass="w-full">
            </p-select>
          </div>

          <div class="input-group">
            <label>{{ 'case_type' | translate }}</label>
            <p-select formControlName="caseType" [options]="caseTypes" optionLabel="label" optionValue="value"
              styleClass="w-full">
            </p-select>
          </div>
        </div>

        <div class="row" *ngIf="Form.value.caseType === 'OTHER'">
          <div class="input-group">
            <label>{{ 'other_case_type' | translate }}</label>
            <input type="text" pInputText formControlName="otherCaseType"
              [placeholder]="'other_case_type_placeholder' | translate" />
          </div>
        </div>

        <div class="row">
          <div class="input-group">
            <label>{{ 'case_date' | translate }}</label>
            <p-datepicker formControlName="caseDate" [showIcon]="true" dateFormat="dd/mm/yy" appendTo="body"
              styleClass="w-full">
            </p-datepicker>
          </div>

        </div>

        <div class="row">
          <div class="input-group">
            <label>{{ 'agency_number' | translate }}</label>
            <input type="text" pInputText formControlName="agencyNumber"
              [placeholder]="'agency_number_placeholder' | translate" />
          </div>
        </div>

        <div class="row toggle-row">
          <label class="inline-toggle">
            <p-toggleswitch formControlName="wantsSpecificLawyer"></p-toggleswitch>
            <span>{{ 'wants_specific_lawyer' | translate }}</span>
          </label>
        </div>

        <div class="row" *ngIf="Form.value.wantsSpecificLawyer">
          <div class="input-group">
            <label>{{ 'preferred_lawyer' | translate }}</label>
            <p-select formControlName="preferredLawyerId" [options]="lawyers()" optionLabel="name" optionValue="id"
              [filter]="true" filterBy="name,email" [placeholder]="'select_lawyer' | translate" [showClear]="true"
              styleClass="w-full">
            </p-select>
          </div>
        </div>

        <h3 class="section-title">{{ 'session_notes' | translate }}</h3>

        <div class="row">
          <div class="input-group">
            <label>{{ 'session_receiver' | translate }}</label>
            <p-select formControlName="sessionReceiverId" [options]="lawyers()" optionLabel="name" optionValue="id"
              [filter]="true" filterBy="name,email" [placeholder]="'select_lawyer' | translate" [showClear]="true"
              styleClass="w-full">
            </p-select>
          </div>

          <div class="input-group">
            <label>{{ 'session_date' | translate }}</label>
            <p-datepicker formControlName="sessionDate" [showIcon]="true" dateFormat="dd/mm/yy" [showClear]="true"
              appendTo="body" styleClass="w-full">
            </p-datepicker>
          </div>
        </div>

        <div class="input-group">
          <label>{{ 'free_notes' | translate }}</label>
          <textarea formControlName="freeNotes" rows="12"
            [placeholder]="'free_notes_placeholder' | translate"></textarea>
        </div>

      </form>
    </section>

    <!-- RIGHT: sticky preview -->
    <aside class="preview-card">
      <div class="preview-sticky">
        <h3 class="preview-title">{{ 'live_preview' | translate }}</h3>
        <app-case-report-template [value]="previewData()"></app-case-report-template>
      </div>
    </aside>

  </div>

  <ng-template #loadingTpl>
    <div class="loading-state">
      <i class="fa-solid fa-spinner fa-spin"></i>
      {{ 'loading' | translate }}
    </div>
  </ng-template>
</div>
