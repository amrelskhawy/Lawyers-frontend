<div class="report-shell" dir="rtl">

  <!-- ============ PAGE 1: CLIENT FORM (image overlay) ============ -->
  <section class="cf-page">
    <div class="ov cf-name">{{ data().customerName || '' }}</div>
    <div class="ov cf-phone" dir="ltr">{{ data().customerPhone || '' }}</div>
    <div class="ov cf-date" dir="ltr">{{ formattedCaseDate() || '' }}</div>
    <div class="ov cf-agency-number" dir="ltr">{{ data().agencyNumber || '' }}</div>

    <!-- Case-type checkboxes -->
    <div class="ov cb cf-ct-criminal"        [class.checked]="isChecked('CRIMINAL')"></div>
    <div class="ov cb cf-ct-administrative"  [class.checked]="isChecked('ADMINISTRATIVE')"></div>
    <div class="ov cb cf-ct-labor"           [class.checked]="isChecked('LABOR')"></div>
    <div class="ov cb cf-ct-commercial"      [class.checked]="isChecked('COMMERCIAL')"></div>
    <div class="ov cb cf-ct-penal"           [class.checked]="isChecked('PENAL')"></div>
    <div class="ov cb cf-ct-general"         [class.checked]="isChecked('GENERAL')"></div>
    <div class="ov cb cf-ct-personal-status" [class.checked]="isChecked('PERSONAL_STATUS')"></div>
    <div class="ov cb cf-ct-other"           [class.checked]="isChecked('OTHER')"></div>

    <div class="ov cf-other-case-type" *ngIf="isChecked('OTHER')">
      {{ data().otherCaseType || '' }}
    </div>

    <!-- Specific-lawyer Yes/No -->
    <div class="ov cb cf-sl-yes" [class.checked]="data().wantsSpecificLawyer === true"></div>
    <div class="ov cb cf-sl-no"  [class.checked]="data().wantsSpecificLawyer === false"></div>

    <div class="ov cf-lawyer-name">{{ data().preferredLawyerName || '' }}</div>
  </section>

  <!-- ============ PAGE 2: LAWYER FORM (image overlay) ============ -->
  <section class="cf2-page">
    <div class="ov cf2-receiver">{{ data().sessionReceiverName || '' }}</div>
    <div class="ov cf2-date" dir="ltr">{{ formattedSessionDate() || '' }}</div>

    <div class="ov cf2-notes">
      <div class="nl" *ngFor="let line of freeLines()">{{ line || '\u00A0' }}</div>
    </div>
  </section>

</div>
