
<app-top-grid (search)="onSearch($event)" (visibelformadd)="visibelform.set(true)"></app-top-grid>

<app-form-holdays (ResponseSuccess)="onHandelResponseSuccess()" [(visible)]="visibelform"></app-form-holdays>
<app-confirmation-delete [visibelConfirme]="visibelConfirme()" (handelstatusConfirmation)="onHandelStatusConfirmation($event)"></app-confirmation-delete>

<app-confirmation-delete [visibelConfirme]="visibelConfirmeBulk()" (handelstatusConfirmation)="onHandelBulkDeleteConfirmation($event)"></app-confirmation-delete>

<div class="table-wrapper">
  @if (selectedItems().length > 0) {
    <button class="bulk-delete-btn" (click)="onBulkDelete()">
      <i class="fa-solid fa-trash"></i> {{ 'delete_selected' | translate }} ({{ selectedItems().length }})
    </button>
  }
  <app-tabel [data]="data()" [bodytabel]="bodytabel()" [no_data]="dataStatus()" [selectable]="true" (selectionChange)="onSelectionChange($event)">
    <ng-template let-data>
      <div class="action-btn">
        <button [attr.aria-label]="'delete'|translate" (click)="onDelete(data)" class="delete-btn"><i class="fa-solid fa-trash"></i></button>
      </div>
    </ng-template>
  </app-tabel>
</div>
