<ng-template #actions let-item let-onDelete="delete">
  <div class="action-btn">
    <button [attr.aria-label]="'delete'|translate" (click)="onDelete(item)" class="delete-btn"><i class="fa-solid fa-trash"></i></button>
  </div>
</ng-template>

<app-dashboard-crud-page
  endpoint="holidays"
  deleteEndpoint="holidays"
  bulkDeleteEndpoint="holidays/many"
  [columns]="columns"
  [searchFields]="searchFields"
  [selectable]="true"
  [actionsTemplate]="actions"
  (addNew)="visibelform.set(true)">

  <app-form-holdays (ResponseSuccess)="onHandelResponseSuccess()" [(visible)]="visibelform"></app-form-holdays>
</app-dashboard-crud-page>
