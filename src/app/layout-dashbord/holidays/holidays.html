
<app-top-grid (visibelformadd)="visibelform.set(true)"></app-top-grid>

<app-form-holdays (ResponseSuccess)="onHandelResponseSuccess()" [(visible)]="visibelform"></app-form-holdays>
<app-confirmation-delete [visibelConfirme]="visibelConfirme()" (handelstatusConfirmation)="onHandelStatusConfirmation($event)"></app-confirmation-delete>

<div class="table-wrapper">
<app-tabel [data]="data()" [bodytabel]="bodytabel()">
  <ng-template let-data>

     <div class="action-btn">
        <button (click)="onDelete(data)" class="delete-btn"><i class="fa-solid fa-trash"></i></button>
      </div>
  </ng-template>
</app-tabel>

</div>
