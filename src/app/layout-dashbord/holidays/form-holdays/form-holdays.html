<p-dialog
  maskStyleClass="backdrop-blur-sm"
  [(visible)]="visible"
  (onHide)="onClose()"
  [modal]="true"
  [baseZIndex]="10000"
  [style]="{ width: '25rem', overflow: 'hidden' }"
>
  <ng-template #headless>
    <div class="header-form">
      <h3>{{ 'add_day_holiday' | translate }}</h3>
      <img width="100" height="50" src="/assets/Img/NAME-GOLD.svg" alt="logo" />
    </div>
    <form [formGroup]="Form()" (ngSubmit)="onSubmitData()">
      <div class="Group">
        <label><i class="fa-regular fa-calendar"></i> {{ 'Date' | translate }}</label>
        <p-datepicker
          appendTo="body"
          formControlName="date"
          [style]="{ width: '100%' }"
          placeholder="{{ 'Date' | translate }}"
          showIcon
          iconDisplay="input"
        />
        <div class="wrapper-error">
          <small
            class="error-message"
            *ngIf="getControlName('date')?.invalid && getControlName('date')?.touched"
            >{{ 'filed_reqierd' | translate }}</small
          >
        </div>
      </div>

      <div class="Group">
        <label><i class="fa-regular fa-user"></i> {{ 'name' | translate }}</label>
        <input formControlName="name" placeholder="{{ 'name' | translate }}" type="text" />
        <div class="wrapper-error">
          <small
            class="error-message"
            *ngIf="getControlName('name')?.invalid && getControlName('name')?.touched"
            >{{ 'filed_reqierd' | translate }}</small
          >
        </div>
      </div>

      <div class="Group">
        <label>From</label>
        <p-datepicker
          formControlName="startTime"
          placeholder="00:00 AM"
          appendTo="body"
          [style]="{ width: '100%' }"
          [timeOnly]="true"
          hourFormat="12"
        >
        </p-datepicker>
        <div class="wrapper-error">
          <small
            class="error-message"
            *ngIf="getControlName('startTime')?.invalid && getControlName('startTime')?.touched"
            >{{ 'filed_reqierd' | translate }}</small
          >
        </div>
      </div>

      <div class="Group">
        <label>To</label>
        <p-datepicker
          placeholder="00:00 PM"
          appendTo="body"
          [style]="{ width: '100%' }"
          formControlName="endTime"
          [timeOnly]="true"
          hourFormat="12"
        >
        </p-datepicker>
        <div class="wrapper-error">
          <small
            class="error-message"
            *ngIf="getControlName('endTime')?.invalid && getControlName('endTime')?.touched"
            >{{ 'filed_reqierd' | translate }}</small
          >
        </div>
      </div>

      <button type="submit" class="btn-submit">
        <i class="fa-solid fa-share"></i> {{ 'submit' | translate }}
      </button>
    </form>
    <button class="btn-close-dilog" (click)="closeDialog()">
      <i class="fa-solid fa-xmark"></i> {{ 'close' | translate }}
    </button>
  </ng-template>
</p-dialog>
