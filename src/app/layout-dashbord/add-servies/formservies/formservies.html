<p-dialog maskStyleClass="backdrop-blur-sm" [(visible)]="visible" (onHide)="onClose()" [modal]="true"
  [baseZIndex]="10000" styleClass="modern-modal" [style]="{ width: '90vw', maxWidth: '500px' }">

  <ng-template pTemplate="headless">
    <div class="modern-form-container">

      <!-- Header -->
      <div class="form-header">
        <div class="header-content">
          <h3>{{ (objData() ? 'edit_servies' : 'add_service') | translate }}</h3>
          <p class="subtitle">{{ 'details_servies' | translate }}</p>
        </div>
        <img src="/assets/Img/LOGO-GOLD.svg" alt="logo" class="header-logo" />
        <button class="close-icon-btn" (click)="closeDialog()">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <!-- Form -->
      <form [formGroup]="Form()" (ngSubmit)="onSubmitData()" class="form-body">

        <!-- Names Section (Grid) -->
        <div class="form-grid">
          <div class="input-group">
            <label>{{ 'name_ar' | translate }}</label>
            <div class="input-wrapper">
              <i class="fa-regular fa-keyboard input-icon"></i>
              <input formControlName="name_ar" placeholder="{{ 'name_ar' | translate }}" type="text" />
            </div>
            <small class="error-msg" *ngIf="getControlName('name_ar')?.invalid && getControlName('name_ar')?.touched">
              {{ 'filed_reqierd' | translate }}
            </small>
          </div>

          <div class="input-group">
            <label>{{ 'name_en' | translate }}</label>
            <div class="input-wrapper">
              <i class="fa-regular fa-keyboard input-icon"></i>
              <input formControlName="name_en" placeholder="{{ 'name_en' | translate }}" type="text" />
            </div>
            <small class="error-msg" *ngIf="getControlName('name_en')?.invalid && getControlName('name_en')?.touched">
              {{ 'filed_reqierd' | translate }}
            </small>
          </div>
        </div>

        <!-- Descriptions -->
        <div class="input-group">
          <label>{{ 'description_ar' | translate }}</label>
          <div class="input-wrapper textarea-wrapper">
            <i class="fa-solid fa-align-right input-icon"></i>
            <textarea formControlName="description_ar" rows="3"
              placeholder="{{ 'description_ar' | translate }}"></textarea>
          </div>
          <small class="error-msg"
            *ngIf="getControlName('description_ar')?.invalid && getControlName('description_ar')?.touched">
            {{ 'filed_reqierd' | translate }}
          </small>
        </div>

        <div class="input-group">
          <label>{{ 'description_en' | translate }}</label>
          <div class="input-wrapper textarea-wrapper">
            <i class="fa-solid fa-align-left input-icon"></i>
            <textarea formControlName="description_en" rows="3"
              placeholder="{{ 'description_en' | translate }}"></textarea>
          </div>
          <small class="error-msg"
            *ngIf="getControlName('description_en')?.invalid && getControlName('description_en')?.touched">
            {{ 'filed_reqierd' | translate }}
          </small>
        </div>

        <!-- Price -->
        <div class="input-group">
          <label>{{ 'price_sevies' | translate }}</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-tag input-icon"></i>
            <input formControlName="price" placeholder="0.00" type="number" />
            <span class="currency-suffix">SAR</span>
          </div>
          <small class="error-msg" *ngIf="getControlName('price')?.invalid && getControlName('price')?.touched">
            {{ 'filed_reqierd' | translate }}
          </small>
        </div>

        <!-- Actions -->
        <div class="form-actions">
          <button type="button" class="btn-secondary" (click)="closeDialog()">
            {{ 'close' | translate }}
          </button>
          <button type="submit" class="btn-primary">
            {{ 'submit' | translate }} <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>

      </form>
    </div>
  </ng-template>
</p-dialog>
