<p-dialog
  maskStyleClass="backdrop-blur-sm"
  [(visible)]="visible"
  (onHide)="onClose()"
  [modal]="true"
  [baseZIndex]="10000"
  [style]="{ width: '30rem', overflow: 'hidden' }"
>
  <ng-template #headless>
    <div class="header-form">
      <h3>
        {{ (objData() ? 'edit_servies' : 'add_service') | translate }}
      </h3>
      <img width="100" height="50" src="/assets/Img/NAME-GOLD.svg" alt="logo" />
    </div>

    <form [formGroup]="Form()" (ngSubmit)="onSubmitData()">
      <div class="Group">
        <label><i class="fa-regular fa-user"></i> {{ 'name_ar' | translate }}</label>
        <input formControlName="name_ar" placeholder="{{ 'name_ar' | translate }}" type="text" />
        <div class="wrapper-error">
          <small
            class="error-message"
            *ngIf="getControlName('namear')?.invalid && getControlName('namear')?.touched"
            >{{ 'filed_reqierd' | translate }}</small
          >
        </div>
      </div>

      <div class="Group">
        <label><i class="fa-regular fa-user"></i> {{ 'name_en' | translate }}</label>
        <input formControlName="name_en" placeholder="{{ 'name_en' | translate }}" type="text" />
        <div class="wrapper-error">
          <small
            class="error-message"
            *ngIf="getControlName('nameen')?.invalid && getControlName('nameen')?.touched"
            >{{ 'filed_reqierd' | translate }}</small
          >
        </div>
      </div>

      <div class="Group">
        <label><i class="fa-solid fa-align-right"></i> {{ 'desc_ar' | translate }}</label>
        <textarea
          placeholder="{{ 'desc_ar' | translate }}"
          formControlName="description_ar"
        ></textarea>
        <div class="wrapper-error">
          <small
            class="error-message"
            *ngIf="
              getControlName('descriptionar')?.invalid && getControlName('descriptionar')?.touched
            "
            >{{ 'filed_reqierd' | translate }}</small
          >
        </div>
      </div>

      <div class="Group">
        <label><i class="fa-solid fa-align-right"></i> {{ 'desc_en' | translate }}</label>
        <textarea
          placeholder="{{ 'desc_en' | translate }}"
          formControlName="description_en"
        ></textarea>
        <div class="wrapper-error">
          <small
            class="error-message"
            *ngIf="
              getControlName('descriptionen')?.invalid && getControlName('descriptionen')?.touched
            "
            >{{ 'filed_reqierd' | translate }}</small
          >
        </div>
      </div>

      <div class="Group">
        <label
          ><i class="fa-solid fa-money-bill-1-wave"></i> {{ 'price_sevies' | translate }}</label
        >
        <input
          formControlName="price"
          placeholder="{{ 'price_sevies' | translate }}"
          type="number"
        />
        <div class="wrapper-error">
          <small
            class="error-message"
            *ngIf="getControlName('price')?.invalid && getControlName('price')?.touched"
            >{{ 'filed_reqierd' | translate }}</small
          >
        </div>
      </div>

      <button class="btn-submit">
        <i class="fa-solid fa-share"></i>{{ 'submit' | translate }}
      </button>
    </form>
    <button class="btn-close-dilog" (click)="closeDialog()">
      <i class="fa-solid fa-xmark"></i> {{ 'close' | translate }}
    </button>
  </ng-template>
</p-dialog>
