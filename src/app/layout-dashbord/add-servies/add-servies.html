<app-top-grid (visibelformadd)="visibelform.set(true)"></app-top-grid>


<app-formservies (ResSuccess)="onHandelRespnseProccing()" [objdata]="objdata()" [(visible)]="visibelform"></app-formservies>


<app-confirmation-delete (handelstatusConfirmation)="onHandelStatusConfirmation($event)" [visibelConfirme]="visibelConfirme()"></app-confirmation-delete>

<app-tabel [data]="data()" [bodytabel]="bodytabel()">
  <ng-template let-item>
    <div class="action-btn">
      <button (click)="onEditData(item)" class="edit-btn">
        <i class="fa-solid fa-pen-to-square"></i> {{"edit"|translate}}
      </button>

      <button (click)="onDelete(item)" class="delete-btn"><i class="fa-solid fa-trash"></i>{{"delete"|translate}}</button>
    </div>
  </ng-template>
</app-tabel>
