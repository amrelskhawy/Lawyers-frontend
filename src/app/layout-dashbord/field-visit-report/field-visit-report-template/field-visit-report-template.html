<div class="fv-shell" dir="rtl">
  <div class="fv-page">
    <div class="ov f-review-lawyer">{{ data().reviewLawyer || '' }}</div>
    <div class="ov f-review-place">{{ data().reviewPlace || '' }}</div>
    <div class="ov f-agency-number">{{ data().agencyNumber || '' }}</div>

    <div class="ov f-client-name">{{ data().clientName || '' }}</div>
    <div class="ov f-case-number">{{ data().caseNumber || '' }}</div>
    <div class="ov f-review-date" dir="ltr">{{ formattedDate(data().reviewDate) }}</div>

    <div class="ov f-report-summary">{{ data().reportSummary || '' }}</div>
  </div>
</div>
