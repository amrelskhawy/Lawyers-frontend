<ng-template #actions let-item let-onDelete="delete">
  <div class="action-btn">
    <button [attr.aria-label]="'delete'|translate" (click)="onDelete(item)" class="delete-btn"><i class="fa-solid fa-trash"></i></button>
  </div>
</ng-template>

<app-dashboard-crud-page
  endpoint="admin/users?role=admin"
  deleteEndpoint="admin/users"
  [columns]="columns"
  [searchFields]="searchFields"
  [page]="'Admin'"
  [actionsTemplate]="actions">
</app-dashboard-crud-page>
