<div class="calendar-wrapper">
  <div class="calendar-nav">
    <p-select
      [options]="months"
      [(ngModel)]="selectedMonth"
      (onChange)="onMonthChange($event)"
      optionLabel="name"
      [style]="{ width: '40%' }"
    />
    <h2>{{ displayDate | date: 'MMMM yyyy' }}</h2>

    <div class="btn-filterbyStatus">
      <button
        [ngClass]="{ All: selectedStatus() === 'All' }"
        (click)="GetAllBookingByStatus('All')"
      >
        ⊞ {{"all"|translate}}
      </button>

      <button
        [ngClass]="{ PENDING: selectedStatus() === 'PENDING' }"
        (click)="GetAllBookingByStatus('PENDING')"
      >
        ⏳ {{"PENDING"|translate}}
      </button>

      <button
        [ngClass]="{ CANCELLED: selectedStatus() === 'CANCELLED' }"
        (click)="GetAllBookingByStatus('CANCELLED')"
      >
        ✕ {{"CANCELLED"|translate}}
      </button>

      <button
        [ngClass]="{ COMPLETED: selectedStatus() === 'COMPLETED' }"
        (click)="GetAllBookingByStatus('COMPLETED')"
      >
        ✓ {{"COMPLETED"|translate}}
      </button>
    </div>
  </div>

  <div class="calendar-grid">
    <div class="day-header" *ngFor="let day of ['SUn', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']">
      {{ day | translate }}
    </div>

    <div class="day-cell" *ngFor="let d of daysInMonth">
      <div class="booking-container">
        <div
          (click)="onShowDilogBooking(book)"
          class="booking-item"
          *ngFor="let book of getBookingsForDay(d)"
        >
          <div class="header-book">
            <p class="date"><i class="fa-solid fa-clock"></i>{{ book.startTime }}</p>
            <span class="day-number">{{ d }}</span>
          </div>
          <div class="content-book">
            <p class="booking-name">{{ book.name }}</p>
            <p>{{ getnameServies(book.service) }}</p>
            <p class="booking-phone">{{ book.phone_number }}</p>
          </div>

          <div class="status-btn" [ngClass]="book.status">
            <i class="fa-solid fa-diagram-project"></i>
            {{ book.status }}
            <span [ngClass]="book.status" class="gemini-dot"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<app-dilog-booking
  (changeStatusBooking)="onchangeStatusBooking()"
  [(visible)]="visibelDilogBooking"
  [obj]="obj()"
></app-dilog-booking>
