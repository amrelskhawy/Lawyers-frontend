<div class="top-menue" [ngClass]="{ collpasedMenue: statusMenue() && !widthScreen() }">
  <button (click)="onToggelMenue()"><i class="fa-solid fa-bars"></i></button>
  <button (click)="onCloselMenue()"><i class="fa-solid fa-xmark"></i></button>
  @if (widthScreen() || !statusMenue()){
    <app-translation></app-translation>
  }
</div>

<section class="content-menue">
  <img
    [ngClass]="{ collpasedMenue: statusMenue() }"
    height="70"
    width="70"
    src="/assets/Img/LOGO-GOLD.svg"
    alt="Logo"
    class="logo-header"
  />

  <ul [ngClass]="{ collpasedMenue: statusMenue() && !widthScreen() }">
    @for (item of ListMenue(); track $index) {
      <li
        (click)="onCloselMenue()"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        [routerLink]="item.route"
        [ngClass]="{ collpasedMenue: statusMenue() && !widthScreen() }"
      >
        <span><i [class]="item.icon"></i></span>
        @if (widthScreen() || !statusMenue()) {
          <span>{{ item.name | translate }}</span>
        }
      </li>
    }
  </ul>
</section>

<div class="menue-absolute">

  <button class="btn-logout" (click)="onLogout()">
    <i class="fa-solid fa-arrow-right-from-bracket"></i>
    <span *ngIf="widthScreen() || !statusMenue()">{{ 'logout' | translate }}</span>
  </button>

  <button (click)="visibelform.set(true)" class="work_day_btn">
    <i class="fa-solid fa-business-time"></i
    ><span *ngIf="widthScreen() || !statusMenue()"> {{ 'Work_Day' | translate }}</span>
  </button>

  <app-form-work-days [(visible)]="visibelform"></app-form-work-days>
  @if (widthScreen() || !statusMenue()) {
    <div class="card">
      <img width="100" src="/assets/Img/NAME-GOLD.svg" alt="logo" />
      <p>{{ 'features_company' | translate }}</p>
    </div>
  }
</div>
