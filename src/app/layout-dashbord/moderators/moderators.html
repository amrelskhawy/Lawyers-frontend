<ng-template #actions let-item let-onDelete="delete">
  <div class="action-btn">
    <button [attr.aria-label]="'delete'|translate" (click)="onDelete(item)" class="delete-btn"><i class="fa-solid fa-trash"></i></button>
  </div>
</ng-template>

<app-dashboard-crud-page
  endpoint="admin/users?role=moderator"
  deleteEndpoint="moderators"
  bulkDeleteEndpoint="moderators/many"
  [columns]="columns"
  [searchFields]="searchFields"
  [selectable]="true"
  [actionsTemplate]="actions"
  (addNew)="visibelform.set(true)">

  <app-form (success)="HandelResponseSuccess()" [visible]="visibelform()"
    (visibleChange)="visibelform.set($event)"></app-form>
</app-dashboard-crud-page>
