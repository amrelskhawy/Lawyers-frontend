<div class="lawyer-fees-contracts-list-page" dir="rtl">
  <div class="page-header">
    <h2>{{ 'lawyer_fees_contracts' | translate }}</h2>
  </div>

  <ng-template #actions let-item let-onDelete="delete">
    <div class="action-btn">
      <button
        [attr.aria-label]="(item.secondPartySignedAt ? 'view' : 'edit') | translate"
        (click)="onEdit(item)"
        class="edit-btn">
        <i
          class="fa-solid"
          [class.fa-eye]="item.secondPartySignedAt"
          [class.fa-pen-to-square]="!item.secondPartySignedAt"></i>
      </button>
      <button
        *ngIf="item.customer?.caseReportsFolderId"
        [attr.aria-label]="'open_drive_folder' | translate"
        (click)="onOpenDriveFolder(item)"
        class="edit-btn">
        <i class="fa-brands fa-google-drive"></i>
      </button>
      <button
        *ngIf="!item.secondPartySignedAt"
        [attr.aria-label]="'delete' | translate"
        (click)="onDelete(item)"
        class="delete-btn">
        <i class="fa-solid fa-trash"></i>
      </button>
    </div>
  </ng-template>

  <app-dashboard-crud-page
    [endpoint]="endpoint()"
    deleteEndpoint="lawyer-fees-contracts"
    [columns]="columns"
    [searchFields]="searchFields"
    [actionsTemplate]="actions"
    [dataMapper]="dataMapper"
    (addNew)="onAddNew()">
  </app-dashboard-crud-page>
</div>
