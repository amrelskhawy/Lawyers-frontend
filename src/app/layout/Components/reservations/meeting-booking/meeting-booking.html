<div class="wrapper-date">
  <div class="header-date">
    <i class="fa-solid fa-address-book"></i>
    <div>
      <h3>بياناتك الشخصية</h3>
      <p>أدخل معلومات التواصل الخاصة بك</p>
    </div>
  </div>
  <form [formGroup]="Form()">
    <div class="Group datepicker">
      <p-datepicker
      formControlName="date"
      [inline]="true"
      [showWeek]="true"
      [disabledDates]="disibledDays()"
       >
      </p-datepicker>

      <div class="wrapper-error">
        <small
          class="error-message"
          *ngIf="getControlName('date')?.invalid && getControlName('date')?.touched"
          >{{ 'filed_reqierd' | translate }}</small
        >
      </div>
    </div>
    @if (timeSlots().length > 0) {
      <div class="Times-container">
        @for (slot of timeSlots(); track $index) {
          <div class="Time-slot"  [ngClass]="{
                'selected-time': slot.startTime == selectedTime(),}">
            <span
              (click)="PathTime(slot.startTime)"
            >
              {{ slot.startTime }}<span class="Timing">Am</span> : {{ slot.endTime}}<span class="Timing">Pm</span>
            </span>
          </div>
        }
        <div class="wrapper-error">
          <small
            class="error-message"
            *ngIf="getControlName('startTime')?.invalid && getControlName('startTime')?.touched"
            >{{ 'SELECT_DATE_TIME' | translate }}</small
          >
        </div>
      </div>
    }
  </form>
        <button (click)="onNextSteap()" class="next-btn"> التالي ←</button>
</div>
