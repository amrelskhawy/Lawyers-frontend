<app-top-header></app-top-header>
<app-header></app-header>

<section class="booking">
  <div class="header-steap-booking">
    <p class="new-meeting">💼 حجز موعد جديد</p>
    <h2>احجز موعدك <span class="span-text">القانوني</span></h2>
    <p class="confirm-booking">أكمل الخطوات الأربع لتأكيد حجزك</p>
  </div>
  <div class="container">
    <p-stepper [(value)]="currentStep" class="basis-[50rem]">
      <p-step-list>
        <p-step [value]="1">{{ 'NAV_SERVICES' | translate }}</p-step>
        <p-step [value]="2" [disabled]="!Form().get('serviceId')?.value">{{ 'data_information' | translate }}</p-step>
        <p-step [value]="3" [disabled]="!Form().get('clientEmail')?.value">{{ 'SELECT_DATE_TIME' | translate }}</p-step>
        <p-step [value]="4" [disabled]="!Form().get('date')?.value">{{ 'confirme_booking' | translate }}</p-step>
      </p-step-list>
      <p-step-panels>
        <p-step-panel [value]="1">
          <ng-template #content let-activateCallback="activateCallback">
            <app-servies-booking
              [dataservies]="dataservies()"
              (serviesid)="onselectServies($event)"
            ></app-servies-booking>
          </ng-template>
        </p-step-panel>

        <p-step-panel [value]="2">
          <ng-template #content let-activateCallback="activateCallback">
            <app-data-booking (dataClient)="EventDataClient($event)"></app-data-booking>
          </ng-template>
        </p-step-panel>

        <p-step-panel [value]="3">
          <ng-template #content let-activateCallback="activateCallback">
            <app-meeting-booking (DateClient)="EventDateClient($event)" [disabledDates]="disabledDates()"></app-meeting-booking>
          </ng-template>
        </p-step-panel>

        <p-step-panel [value]="4">
          <ng-template #content let-activateCallback="activateCallback">
            <app-confirme-booking [form]="Form()" [nameServies]="detailsservies()"></app-confirme-booking>
          </ng-template>
        </p-step-panel>
      </p-step-panels>
    </p-stepper>
  </div>
</section>

<app-footer></app-footer>
