<section class="team-section" id="teamWork">
  <!-- Background Decorations -->
  <div class="bg-decoration">
    <div class="glow glow-gold"></div>
    <div class="glow glow-navy"></div>
    <div class="pattern-mesh"></div>
  </div>
  
  <div class="container">
    <div class="section-header">
      <div class="header-badge">{{ "teamWork" | translate }}</div>
      <h2 class="section-title">{{ "TEAM_WORK_TITLE" | translate }}</h2>
      <p class="section-subtitle">{{ "TEAM_WORK_SUBTITLE" | translate }}</p>
    </div>

    <div class="team-carousel-container">
      <p-carousel
        [value]="teamMembers"
        [numVisible]="6"
        [numScroll]="1"
        [circular]="true"
        [responsiveOptions]="responsiveOptions"
        [autoplayInterval]="4000"
      >
        <ng-template pTemplate="item" let-member>
          <div class="member-card-wrapper">
            <div class="member-card my-enter-zoom">
              <div class="member-image-box">
                <img [src]="member.image" [alt]="member.name" class="member-photo" />
                <div class="image-overlay"></div>
                <div class="member-socials-mini">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
              </div>
              
              <div class="member-details">
                <div class="details-inner">
                    <h3 class="member-name">{{ member.name }}</h3>
                    <span class="member-position">{{ member.role }}</span>
                </div>
                <div class="card-line"></div>
              </div>
            </div>
          </div>
        </ng-template>
      </p-carousel>
    </div>
  </div>
</section>
